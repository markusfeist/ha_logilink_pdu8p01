  <!-- Port 5 -->
  <rect x="288" y="241" width="22" height="30" rx="4" fill="#37474F" />
  <circle cx="299" cy="256" r="4" fill="#111" />
  <!-- Port 6 -->
  <rect x="320" y="241" width="22" height="30" rx="4" fill="#37474F" />
